name: Distill
options:
  bundleIdPrefix: com.distill
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.11.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  Distill:
    type: application
    platform: iOS
    sources:
      - Distill
    settings:
      base:
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "需要麦克风权限来录制音频进行转录"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: "Distill 炼金"
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
      configs:
        debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: WhisperKit
      - package: MarkdownUI
    info:
      path: Distill/Resources/Info.plist
