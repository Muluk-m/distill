<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="phoneClip">
      <rect x="250" y="30" width="300" height="540" rx="36"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#FF8C00" opacity="0.05"/>
  <circle cx="700" cy="500" r="250" fill="#FF6B00" opacity="0.04"/>

  <!-- Phone Frame -->
  <g filter="shadow">
    <rect x="250" y="30" width="300" height="540" rx="36" fill="#000000"/>
    <rect x="250" y="30" width="300" height="540" rx="36" stroke="#333" stroke-width="1"/>
  </g>

  <!-- Phone Screen -->
  <g clip-path="url(#phoneClip)">
    <rect x="250" y="30" width="300" height="540" fill="#0a0a0a"/>

    <!-- Status Bar -->
    <text x="274" y="58" fill="#fff" font-family="-apple-system,SF Pro Text,sans-serif" font-size="12" font-weight="600">9:41</text>
    <circle cx="518" cy="54" r="3" fill="#4ade80"/>
    <rect x="528" y="50" width="16" height="8" rx="2" fill="#fff" opacity="0.8"/>

    <!-- Nav Title -->
    <text x="274" y="96" fill="#ffffff" font-family="-apple-system,SF Pro Display,sans-serif" font-size="22" font-weight="700">Distill 炼金</text>

    <!-- Header -->
    <text x="400" y="136" fill="#ffffff" font-family="-apple-system,SF Pro Display,sans-serif" font-size="16" font-weight="600" text-anchor="middle">把长内容炼成金</text>
    <text x="400" y="156" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" text-anchor="middle">导入音视频，AI 帮你提炼出可直接发布的内容</text>

    <!-- Import Button -->
    <rect x="270" y="176" width="260" height="48" rx="12" fill="#FF8C00" opacity="0.12"/>
    <text x="330" y="205" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="14" font-weight="500">📄 导入音视频文件</text>

    <!-- Record Button -->
    <rect x="270" y="234" width="260" height="48" rx="12" fill="#3b82f6" opacity="0.12"/>
    <text x="330" y="263" fill="#60a5fa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="14" font-weight="500">🎙️ 录音</text>

    <!-- Output Format Section -->
    <text x="274" y="310" fill="#ffffff" font-family="-apple-system,SF Pro Text,sans-serif" font-size="13" font-weight="600">输出格式</text>

    <!-- Tags Row 1 -->
    <rect x="270" y="320" width="72" height="28" rx="14" fill="#FF8C00" opacity="0.2"/>
    <text x="283" y="339" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="500">金句摘录</text>
    <rect x="350" y="320" width="84" height="28" rx="14" fill="#FF8C00" opacity="0.2"/>
    <text x="363" y="339" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="500">小红书笔记</text>
    <rect x="442" y="320" width="76" height="28" rx="14" fill="#FF8C00" opacity="0.2"/>
    <text x="455" y="339" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="500">公众号草稿</text>

    <!-- Tags Row 2 -->
    <rect x="270" y="354" width="72" height="28" rx="14" fill="#FF8C00" opacity="0.2"/>
    <text x="283" y="373" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="500">推特/即刻</text>
    <rect x="350" y="354" width="72" height="28" rx="14" fill="#FF8C00" opacity="0.2"/>
    <text x="363" y="373" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="500">要点笔记</text>

    <!-- Result Card -->
    <rect x="270" y="400" width="260" height="130" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="290" y="426" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="12" font-weight="600">✨ 金句摘录</text>
    <rect x="470" y="412" width="44" height="22" rx="6" fill="#FF8C00" opacity="0.15"/>
    <text x="479" y="427" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">复制</text>

    <text x="290" y="450" fill="#ccc" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10">1. 真正的创新不是技术本身，而是</text>
    <text x="290" y="465" fill="#ccc" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10">   技术与人之间的连接方式。</text>
    <text x="290" y="485" fill="#ccc" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10">2. 好的产品应该像水一样，用户感</text>
    <text x="290" y="500" fill="#ccc" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10">   受不到它的存在，但离不开它。</text>
    <text x="290" y="520" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10">3. 简单不是少，而是刚刚好...</text>

    <!-- Tab Bar -->
    <rect x="250" y="536" width="300" height="34" fill="#0a0a0a"/>
    <line x1="250" y1="536" x2="550" y2="536" stroke="#222" stroke-width="0.5"/>
    <text x="320" y="556" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9" font-weight="600" text-anchor="middle">炼金</text>
    <text x="400" y="556" fill="#555" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9" text-anchor="middle">历史</text>
    <text x="480" y="556" fill="#555" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9" text-anchor="middle">设置</text>

    <!-- Dynamic Island -->
    <rect x="360" y="36" width="80" height="24" rx="12" fill="#000"/>
  </g>

  <!-- Left floating card: Xiaohongshu -->
  <g transform="translate(30, 160)" filter="shadow">
    <rect width="190" height="110" rx="14" fill="#1a1a2e" stroke="#FF8C00" stroke-opacity="0.2" stroke-width="1"/>
    <text x="16" y="28" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600">📕 小红书笔记</text>
    <text x="16" y="48" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">这期播客让我醍醐灌顶！🔥</text>
    <text x="16" y="63" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">关于创业最重要的三个认知...</text>
    <text x="16" y="78" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">1️⃣ 先活下来再说</text>
    <text x="16" y="96" fill="#FF8C00" font-family="-apple-system,SF Pro Text,sans-serif" font-size="8" opacity="0.7">#创业 #认知升级 #播客推荐</text>
  </g>

  <!-- Right floating card: Twitter -->
  <g transform="translate(580, 120)" filter="shadow">
    <rect width="190" height="90" rx="14" fill="#1a1a2e" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="16" y="28" fill="#60a5fa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600">🐦 推特 Thread</text>
    <text x="16" y="48" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">刚听完一个关于 AI 产品设计的</text>
    <text x="16" y="63" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">播客，几个核心观点分享 🧵👇</text>
    <text x="16" y="80" fill="#60a5fa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="8" opacity="0.7">1/5</text>
  </g>

  <!-- Right floating card: Notes -->
  <g transform="translate(580, 340)" filter="shadow">
    <rect width="190" height="110" rx="14" fill="#1a1a2e" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>
    <text x="16" y="28" fill="#4ade80" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600">📋 要点笔记</text>
    <text x="16" y="48" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">• 产品设计三原则</text>
    <text x="16" y="63" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">  ◦ 用户价值优先</text>
    <text x="16" y="78" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">  ◦ 最小可用原则</text>
    <text x="16" y="93" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">  ◦ 数据驱动迭代</text>
  </g>

  <!-- Left floating card: WeChat -->
  <g transform="translate(30, 380)" filter="shadow">
    <rect width="190" height="90" rx="14" fill="#1a1a2e" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
    <text x="16" y="28" fill="#22c55e" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600">📝 公众号草稿</text>
    <text x="16" y="48" fill="#aaa" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">《为什么好产品都像水？》</text>
    <text x="16" y="63" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">最近听了一期关于产品哲学的</text>
    <text x="16" y="78" fill="#888" font-family="-apple-system,SF Pro Text,sans-serif" font-size="9">深度对话，收获颇多...</text>
  </g>

  <!-- Connecting lines (subtle) -->
  <line x1="220" y1="220" x2="250" y2="250" stroke="#FF8C00" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="550" y1="200" x2="580" y2="170" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="550" y1="400" x2="580" y2="390" stroke="#4ade80" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="220" y1="420" x2="250" y2="400" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
